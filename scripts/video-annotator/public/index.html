<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cortex Video Annotator</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Cortex Video Annotator</h1>
      <div class="header-stats" id="stats">loading…</div>
      <div class="header-actions">
        <button class="btn btn-secondary btn-sm" onclick="app.reimport()">Re-Import</button>
        <a class="btn btn-secondary btn-sm" href="/api/export?include=mine" download>Export Mine</a>
        <a class="btn btn-secondary btn-sm" href="/api/export?include=mine,unsure" download>Export Mine+Unsure</a>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-filters">
        <input type="text" id="search" placeholder="Search filename, title, tags, notes..." oninput="app.debouncedFilter()">
        <select id="filter-decision" onchange="app.applyFilters()">
          <option value="">All decisions</option>
          <option value="pending">Pending</option>
          <option value="mine">Mine</option>
          <option value="skip">Skip</option>
          <option value="unsure">Unsure</option>
        </select>
        <select id="filter-year" onchange="app.applyFilters()">
          <option value="">All years</option>
        </select>
        <select id="filter-transcribed" onchange="app.applyFilters()">
          <option value="">Any transcribe state</option>
          <option value="1">Transcribed</option>
          <option value="partial">Partial</option>
          <option value="error">Errored</option>
          <option value="0">Not yet</option>
        </select>
        <select id="filter-sort" onchange="app.applyFilters()">
          <option value="filmed_date">Sort: filmed date</option>
          <option value="filename">Sort: filename</option>
          <option value="size_desc">Sort: size (largest)</option>
          <option value="size_asc">Sort: size (smallest)</option>
        </select>
      </div>
      <div class="video-list" id="video-list"></div>
    </aside>

    <main class="viewer" id="viewer">
      <div class="viewer-placeholder">
        <h2>Select a video from the list to begin annotating</h2>
        <p>Tip: <kbd>↑</kbd>/<kbd>↓</kbd> navigate · <kbd>M</kbd>=Mine, <kbd>S</kbd>=Skip, <kbd>U</kbd>=Unsure · <kbd>Ctrl+S</kbd> save</p>
      </div>
    </main>

    <aside class="panel" id="panel">
      <p class="panel-empty">Pick a video from the list.</p>
    </aside>

    <footer class="footer">
      <div class="footer-nav">
        <button class="btn btn-secondary btn-sm" onclick="app.prevVideo()">◀ Prev</button>
        <button class="btn btn-secondary btn-sm" onclick="app.nextVideo()">Next ▶</button>
      </div>
      <div id="position-info"></div>
      <div id="footer-progress"></div>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
