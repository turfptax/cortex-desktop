name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      # Run the test suite before spending CI minutes on Vulkan,
      # whisper.cpp, and PyInstaller. A red test fails the build
      # (and therefore blocks the release tag) early.
      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -q

      - name: Install frontend dependencies
        working-directory: hub/frontend
        run: npm ci

      - name: Build frontend
        working-directory: hub/frontend
        run: npm run build

      # Slice 7 CP3: install Vulkan SDK so whisper.cpp builds with
      # GPU support. The compiled binary works on every modern
      # Windows machine (NVIDIA / AMD / Intel — vulkan-1.dll ships
      # with all current GPU drivers). Falls back to CPU at runtime
      # if Vulkan device init fails.
      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.4.0
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true
          stripdown: true

      # Slice 7 CP2: build whisper.cpp from a pinned tag and stage
      # the binary at hub/backend/bin/whisper-cli.exe so PyInstaller
      # picks it up. Cached across runs since whisper.cpp tag is
      # pinned in the script. Cache key now includes vulkan to
      # avoid serving a stale CPU-only binary after the SDK lands.
      - name: Cache whisper-cli binary
        id: whisper-cache
        uses: actions/cache@v4
        with:
          path: hub/backend/bin
          key: whisper-cli-${{ runner.os }}-vulkan-${{ hashFiles('scripts/build_whisper_cpp.py') }}

      # whisper.cpp v1.8.x's vulkan-shaders-gen subproject builds via
      # nested CMake TryCompile dirs that exceed the legacy 260-char
      # MAX_PATH limit. Enable Windows long paths system-wide AND in git
      # before the build. The build script also uses a short root
      # (C:\b\) to belt-and-suspenders this. (See dev.16 build failure.)
      - name: Enable Windows long paths
        if: runner.os == 'Windows'
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true
        shell: pwsh

      - name: Build whisper.cpp (if cache miss)
        if: steps.whisper-cache.outputs.cache-hit != 'true'
        run: python scripts/build_whisper_cpp.py
        shell: pwsh

      - name: Build exe (PyInstaller)
        run: python build.py --skip-frontend

      - name: Zip release
        run: Compress-Archive -Path dist/CortexHub/* -DestinationPath CortexHub-windows-x64.zip
        shell: pwsh

      # Build installer with Inno Setup
      - name: Extract version from tag
        id: version
        run: |
          $ref = "${{ github.ref_name }}"
          $ver = $ref -replace '^v', ''
          if (-not ($ver -match '^\d+\.\d+')) { $ver = "0.0.0" }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build installer (Inno Setup)
        run: iscc /DMyAppVersion="${{ steps.version.outputs.version }}" installer.iss

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CortexHub-windows-x64
          path: CortexHub-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CortexHub-Setup
          path: Output/CortexHub-Setup-*.exe

      # Detect if this is a pre-release tag (dev, rc, alpha, beta)
      - name: Check pre-release
        id: prerelease
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = "${{ github.ref_name }}"
          $is_pre = $tag -match '-(dev|rc|alpha|beta)'
          echo "is_prerelease=$($is_pre.ToString().ToLower())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      # Create a stable release for clean version tags (e.g. v0.11.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CortexHub-windows-x64.zip
            Output/CortexHub-Setup-*.exe
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
