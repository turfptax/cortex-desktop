name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: hub/frontend
        run: npm ci

      - name: Build frontend
        working-directory: hub/frontend
        run: npm run build

      - name: Build exe (PyInstaller)
        run: python build.py --skip-frontend

      - name: Zip release
        run: Compress-Archive -Path dist/CortexHub/* -DestinationPath CortexHub-windows-x64.zip
        shell: pwsh

      # Build installer with Inno Setup
      - name: Extract version from tag
        id: version
        run: |
          $ref = "${{ github.ref_name }}"
          $ver = $ref -replace '^v', ''
          if (-not ($ver -match '^\d+\.\d+')) { $ver = "0.0.0" }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build installer (Inno Setup)
        run: iscc /DMyAppVersion="${{ steps.version.outputs.version }}" installer.iss

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CortexHub-windows-x64
          path: CortexHub-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CortexHub-Setup
          path: Output/CortexHub-Setup-*.exe

      # Only create a release when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CortexHub-windows-x64.zip
            Output/CortexHub-Setup-*.exe
          generate_release_notes: true
